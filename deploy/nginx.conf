# HomeHero — single-domain reverse proxy (nginx).
# Routes /api + /socket.io to the gateway (:4000) and everything else to the
# frontend SSR server (:4174). Terminate TLS here (certs via certbot/Let's
# Encrypt). Replace app.homehero.com and the cert paths.

# Map the Upgrade header so WebSocket (Socket.IO) connections proxy correctly.
map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

server {
	listen 80;
	server_name app.homehero.com;
	# Redirect all HTTP to HTTPS.
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	http2 on;
	server_name app.homehero.com;

	ssl_certificate     /etc/letsencrypt/live/app.homehero.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/app.homehero.com/privkey.pem;

	client_max_body_size 10m;

	# API → gateway
	location /api/ {
		proxy_pass http://127.0.0.1:4000;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# Socket.IO (realtime) → gateway, with WebSocket upgrade
	location /socket.io/ {
		proxy_pass http://127.0.0.1:4000;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 600s;
	}

	# App (SSR + static) → frontend production server
	location / {
		proxy_pass http://127.0.0.1:4174;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
